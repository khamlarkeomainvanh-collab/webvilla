<!DOCTYPE html>
{% load static %}
<html lang="lo">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>ສົ່ງສຳເລັດ | EX ມໍເຕີ້</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@300;400;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

    <style>
        :root {
            --primary-pink: #FF85A2;
            --dark-pink: #F75C7E;
            --soft-pink: #FFE4E9;
            --bg-gradient: linear-gradient(135deg, #FFF1F3 0%, #FFD1DC 100%);
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Noto Sans Lao', sans-serif;
            background: var(--bg-gradient);
            display: flex;
            flex-direction: column;
        }

        .main-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .success-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 60px 40px;
            text-align: center;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(255, 133, 162, 0.2);
            border: 2px solid white;
            transition: transform 0.3s ease;
        }

        .success-card:hover {
            transform: translateY(-8px);
        }

        .icon-circle {
            width: 110px;
            height: 110px;
            background: var(--soft-pink);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
        }

        .check-icon {
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
            animation: dash 0.9s cubic-bezier(0.65, 0, 0.45, 1) forwards;
        }

        @keyframes dash {
            to { stroke-dashoffset: 0; }
        }

        .status-title {
            color: var(--dark-pink);
            font-weight: 700;
            margin-bottom: 15px;
            font-size: 2rem;
        }

        .status-text {
            color: #7d6e71;
            font-size: 1.15rem;
            line-height: 1.7;
        }

        /* ປັບແກ້ປຸ່ມໃຫ້ຕົວໜັງສືແຈ້ງຂຶ້ນ */
        .btn-custom {
            background: linear-gradient(to right, #FF85A2, #F75C7E);
            color: #ffffff !important;
            padding: 14px 45px;
            border-radius: 50px;
            font-weight: 700; /* ເພີ່ມຄວາມໜາ */
            font-size: 1.2rem; /* ເພີ່ມຂະໜາດ */
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none !important;
            border: none;
            transition: all 0.4s ease;
            margin-top: 25px;
            box-shadow: 0 8px 20px rgba(247, 92, 126, 0.4);
            /* ເພີ່ມ Text Shadow ເພື່ອໃຫ້ຕົວໜັງສືຂາວຕັດກັບພື້ນສີບົວແຈ້ງໆ */
            text-shadow: 0px 1px 3px rgba(0, 0, 0, 0.2); 
        }

        .btn-custom:hover {
            box-shadow: 0 12px 25px rgba(247, 92, 126, 0.5);
            transform: translateY(-3px) scale(1.03);
            filter: brightness(1.05);
        }

        hr {
            margin: 35px 0;
            border: 0;
            height: 1px;
            background-image: linear-gradient(to right, rgba(0,0,0,0), rgba(255, 133, 162, 0.3), rgba(0,0,0,0));
        }

        .text-muted-pink {
            color: #B29198;
            font-size: 0.95rem;
            font-weight: 400;
        }
    </style>
</head>

<body>
    {% include "ecom/navbar.html" %}

    <main class="main-container">
        <div class="success-card">
            <div class="icon-circle">
                <svg width="65" height="65" viewBox="0 0 24 24" fill="none" stroke="#F75C7E" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <path class="check-icon" d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                    <polyline class="check-icon" points="22 4 12 14.01 9 11.01"></polyline>
                </svg>
            </div>

            <h1 class="status-title">ສົ່ງຂໍ້ຄວາມສຳເລັດ!</h1>
            <p class="status-text">
                ຂອບໃຈທີ່ໄວ້ວາງໃຈ <b>EX ມໍເຕີ້</b> <br>
                ພວກເຮົາໄດ້ຮັບຂໍ້ມູນຂອງທ່ານແລ້ວ ແລະ ຈະມີພະນັກງານຕິດຕໍ່ຫາໂດຍໄວທີ່ສຸດ.
            </p>

            <hr>

            <p class="text-muted-pink">ທ່ານສາມາດກັບໄປເລືອກເບິ່ງສິນຄ້າອື່ນໆຕໍ່ໄດ້ເລີຍ</p>
            
            <a href="/" class="btn btn-custom">
                <!-- ໃສ່ Icon ເຮືອນນ້ອຍໆທາງໜ້າເພື່ອຄວາມງາມ -->
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 10px;">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                ກັບຄືນໜ້າຫຼັກ
            </a>
        </div>
    </main>

    {% include "ecom/footer.html" %}

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
