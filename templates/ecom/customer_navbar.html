{% load static %}
<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;700;800;900&family=Noto+Sans+Lao:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
<style>
:root {
    --pk:   #ec4899; --pk2:  #f472b6; --pk-lt: #fce7f3;
    --pk-d: #be185d;
    --pu:   #7c3aed; --pu2:  #a855f7; --pu-lt: #f5f3ff;
    --lav:  #ede9fe; --lav2: #ddd6fe;
    --text: #2d1457;
}
html { font-size: 17px; }
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family:'Lexend','Noto Sans Lao',sans-serif;
    padding-top: 172px;
    overflow-x: hidden;
}
@media(max-width:768px) { body { padding-top: 215px; } }

/* ── NAVBAR ── */
#navbar {
    position: fixed; top: 0; left: 0; width: 100%; z-index: 9999;
    background: rgba(255,255,255,.99);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border-bottom: 2.5px solid var(--lav2);
    box-shadow: 0 4px 32px rgba(124,58,237,.12);
    padding: 10px 0 14px;
    transition: .3s;
}

/* TOP BAR */
.top-bar {
    border-bottom: 1.5px solid var(--lav2);
    padding-bottom: 10px; margin-bottom: 14px;
    background: var(--pu-lt);
}
.upper-links { display: flex; justify-content: flex-end; align-items: center; gap: 8px; flex-wrap: wrap; }
.links {
    color: var(--pu); font-size: 1.05rem; font-weight: 900;
    padding: 9px 20px; border-radius: 50px;
    text-decoration: none !important; transition: .25s;
    display: inline-flex; align-items: center; gap: 8px;
    background: #ffffff; border: 1.5px solid var(--lav2);
    letter-spacing: .2px;
}
.links:hover { background: var(--lav); color: #5b21b6; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(124,58,237,.18); }
.links b { color: #5b21b6; font-weight: 900; }

/* DROPDOWN */
.dropdown-menu {
    border-radius: 20px !important; border: 2px solid #fbcfe8 !important;
    box-shadow: 0 16px 48px rgba(236,72,153,.18) !important;
    padding: 8px !important; margin-top: 10px !important;
    background: #ffffff !important;
}
.dropdown-menu li a {
    padding: 11px 18px !important; font-weight: 800 !important; font-size: 1rem !important;
    color: var(--text) !important; transition: .2s !important;
    border-radius: 12px !important; display: flex !important;
    align-items: center !important; gap: 9px !important;
}
.dropdown-menu li a:hover { background: var(--pk-lt) !important; color: var(--pk-d) !important; }
.dropdown-menu .divider { background: #fbcfe8 !important; margin: 6px 0 !important; }

/* MAIN NAV ROW */
.main-navbar {
    display: flex; align-items: center;
    justify-content: space-between; gap: 18px; flex-wrap: wrap;
}

/* LOGO */
.brand-logo {
    text-decoration: none !important; color: var(--text) !important;
    display: flex; align-items: center; gap: 14px; letter-spacing: -.5px;
}
.logo-icon {
    width: 68px; height: 68px; border-radius: 20px; flex-shrink: 0;
    background: linear-gradient(145deg, #f472b6 0%, #ec4899 40%, #a855f7 100%);
    display: flex; align-items: center; justify-content: center;
    font-size: 2.1rem; color: #fff; position: relative; overflow: hidden;
    box-shadow: 0 10px 32px rgba(236,72,153,.40);
    transition: .35s;
    animation: float 3.5s ease-in-out infinite;
}
.logo-icon::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(circle at 35% 35%, rgba(255,255,255,.35), transparent 60%);
}
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
.brand-logo:hover .logo-icon {
    transform: rotate(-8deg) scale(1.1); animation: none;
    box-shadow: 0 18px 48px rgba(236,72,153,.5);
}
.logo-text { display: flex; flex-direction: column; line-height: 1.1; }
.logo-text .t2 { font-size: 2rem; font-weight: 900; color: #9d174d; letter-spacing: -.5px; }
.logo-text .t3 { font-size: .82rem; font-weight: 700; color: var(--pk); margin-top: 2px; }

/* SEARCH */
.search-wrapper {
    background: #fce7f3; border-radius: 50px; padding: 5px;
    display: flex; align-items: center;
    border: 2px solid #fbcfe8; transition: .3s;
}
.search-wrapper:focus-within {
    border-color: var(--pk);
    background: #fff;
    box-shadow: 0 0 0 4px rgba(236,72,153,.15);
}
.navbar-input {
    border: none !important; background: transparent;
    width: 100%; padding: 11px 20px;
    font-size: 1.05rem; font-weight: 700; outline: none;
    color: var(--text);
    font-family:'Lexend','Noto Sans Lao',sans-serif;
}
.navbar-input::placeholder { color: #f9a8d4; font-weight: 500; }
.search-btn {
    background: linear-gradient(135deg, var(--pk), var(--pk-d));
    color: #fff; border: none; padding: 12px 24px; border-radius: 50px;
    font-weight: 900; font-size: 1rem;
    display: flex; align-items: center; gap: 7px;
    transition: .3s; cursor: pointer;
    box-shadow: 0 4px 14px rgba(236,72,153,.35);
    font-family:'Lexend','Noto Sans Lao',sans-serif;
}
.search-btn:hover { transform: scale(1.05); box-shadow: 0 8px 24px rgba(236,72,153,.5); }

/* CART */
.cart-link {
    background: linear-gradient(135deg, var(--pk), var(--pu));
    color: #fff !important; text-decoration: none !important;
    padding: 15px 28px; border-radius: 50px;
    display: flex; align-items: center; gap: 12px;
    font-weight: 900; font-size: 1.1rem;
    box-shadow: 0 10px 28px rgba(236,72,153,.35);
    transition: .35s; white-space: nowrap;
}
.cart-link:hover { transform: translateY(-3px) scale(1.04); box-shadow: 0 18px 40px rgba(236,72,153,.5); }
.badge-count {
    min-width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    background: #fff; color: var(--pk-d);
    border-radius: 50px; font-size: .88rem; font-weight: 900;
}

/* AVATAR */
.av {
    width: 34px; height: 34px; border-radius: 50%;
    background: linear-gradient(135deg, var(--pk), var(--pu));
    color: #fff; font-weight: 900; font-size: .85rem;
    display: inline-flex; align-items: center; justify-content: center;
}

@media(max-width:768px) {
    .top-bar { padding: 8px 0; }
    .upper-links {
        justify-content: flex-start; flex-wrap: nowrap;
        overflow-x: auto; -webkit-overflow-scrolling: touch;
        scrollbar-width: none; -ms-overflow-style: none;
        gap: 6px; padding: 0 14px;
    }
    .upper-links::-webkit-scrollbar { display: none; }
    .links {
        font-size: .78rem; padding: 6px 13px;
        white-space: nowrap; flex-shrink: 0;
    }
    .av { width: 24px; height: 24px; font-size: .65rem; }
    .main-navbar { flex-direction: column; align-items: stretch; gap: 8px; }
    .brand-logo { justify-content: center; gap: 8px; }
    .logo-icon { width: 36px; height: 36px; border-radius: 12px; font-size: 1.1rem; }
    .logo-text .t2 { font-size: 1.05rem; }
    .logo-text .t3 { font-size: .68rem; }
    .navbar-input { padding: 7px 12px; font-size: .85rem; }
    .search-btn { padding: 8px 14px; font-size: .82rem; }
    .cart-link { justify-content: center; padding: 9px 16px; font-size: .85rem; gap: 8px; }
    .badge-count { min-width: 20px; height: 20px; font-size: .72rem; }
    /* dropdown must escape .upper-links' overflow-x:auto clipping, or it becomes unopenable */
    .dropdown-menu {
        position: fixed !important;
        top: calc(var(--nav-h, 172px) + 4px) !important;
        left: 14px !important; right: 14px !important;
        width: auto !important; max-width: none !important;
    }
}
</style>
</head>
<body>

<nav id="navbar">
<div class="container">

    <!-- TOP BAR -->
    <div class="row top-bar">
        <div class="col-md-12 text-right">
            <div class="upper-links">
                {% if user.is_authenticated %}
                <div class="dropdown" style="display:inline-flex;align-items:center;">
                    <a href="#" class="links dropdown-toggle" data-toggle="dropdown">
                        <span class="av">{{ user.username|first|upper }}</span>
                        ສະບາຍດີ, <b>{{ user.username }}</b>
                        <span class="caret"></span>
                    </a>
                    <ul class="dropdown-menu">
                        <li><a href="{% url 'my-order' %}"><i class="fas fa-list-alt"></i> ລາຍການສັ່ງຊື້</a></li>
                        <li><a href="{% url 'my-profile' %}"><i class="fas fa-user-circle"></i> ໂປຣໄຟລ໌</a></li>
                        <li class="divider"></li>
                        <li>
                            <form action="{% url 'logout' %}" method="post" id="logout-form-c" style="display:none;">{% csrf_token %}</form>
                            <a href="javascript:void(0)" onclick="document.getElementById('logout-form-c').submit();"
                               style="color:#ec4899 !important;">
                                <i class="fas fa-sign-out-alt"></i> ອອກຈາກລະບົບ
                            </a>
                        </li>
                    </ul>
                </div>
                {% else %}
                <a href="/customerlogin"  class="links"><i class="fas fa-sign-in-alt"></i> ເຂົ້າສູ່ລະບົບ</a>
                <a href="/customersignup" class="links"><i class="fas fa-user-plus"></i> ສະໝັກສະມາຊິກ</a>
                {% endif %}
                <a href="/adminclick" class="links"><i class="fas fa-gear"></i> ແອດມິນ</a>
                <a href="/contactus"  class="links"><i class="fas fa-envelope"></i> ຕິດຕໍ່</a>
                <a href="/aboutus"    class="links"><i class="fas fa-circle-info"></i> ກ່ຽວກັບ</a>
            </div>
        </div>
    </div>

    <!-- MAIN NAV -->
    <div class="main-navbar">
        <!-- LOGO -->
        <a class="brand-logo" href="/">
            <div class="logo-icon"><i class="fas fa-blender"></i></div>
            <div class="logo-text">
                <span class="t2">ຮ້ານ ນໍ້າປັ່ນ VILLA</span>
            </div>
        </a>

        <!-- SEARCH -->
        <div style="flex:1; min-width:240px;">
            <form action="/search" method="get">
                <div class="search-wrapper">
                    <input type="text" class="navbar-input"
                           placeholder=" ຄົ້ນຫາເມນູ..." name="query">
                    <button type="submit" class="search-btn">
                        <i class="fas fa-search"></i>
                        <span>ຄົ້ນຫາ</span>
                    </button>
                </div>
            </form>
        </div>

        <!-- CART -->
        <a href="/cart" class="cart-link">
            <i class="fas fa-cart-shopping"></i>
            ກະຕ່າ
            <span class="badge-count" id="cart-count">{{ cart_total_items }}</span>
        </a>
    </div>

</div>
</nav>

<script>
(function _syncNavH() {
    function fit() {
        var nav = document.getElementById('navbar');
        if (!nav) return;
        document.documentElement.style.setProperty('--nav-h', nav.offsetHeight + 'px');
    }
    document.addEventListener('DOMContentLoaded', fit);
    window.addEventListener('resize', fit);
})();

function addToCart(productId) {
    const qty = (document.getElementById('qty-' + productId) || {value:1}).value;
    fetch('/add-to-cart/' + productId + '/?quantity=' + qty, {
        headers: { 'X-Requested-With': 'XMLHttpRequest' }
    })
    .then(r => r.json())
    .then(data => {
        if (data.status === 'success') {
            const cc = document.getElementById('cart-count');
            if (cc) {
                cc.innerText = data.total_items;
                cc.style.transform = 'scale(1.6)';
                setTimeout(() => cc.style.transform = 'scale(1)', 200);
            }
            _showToast();
        }
    });
}
function _showToast() {
    const t = document.createElement('div');
    t.innerHTML = '<i class="fas fa-check-circle"></i> ເພີ່ມສິນຄ້າສຳເລັດ';
    Object.assign(t.style, {
        position:'fixed', bottom:'28px', right:'28px',
        background:'linear-gradient(135deg,#ec4899,#7c3aed)',
        color:'#fff', padding:'14px 22px', borderRadius:'50px',
        fontWeight:'800', fontSize:'15px', zIndex:'99999',
        boxShadow:'0 12px 32px rgba(124,58,237,.35)',
        fontFamily:"'Lexend','Noto Sans Lao',sans-serif",
        display:'flex', alignItems:'center', gap:'10px'
    });
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2500);
}
</script>

</body>
</html>
