{% extends 'ecom/customer_base.html' %}
{% block content %}

<style>
.closed-wrap {
    max-width: 560px; margin: 60px auto; padding: 0 20px;
    text-align: center;
}
.closed-icon {
    width: 90px; height: 90px; border-radius: 28px; margin: 0 auto 22px;
    background: linear-gradient(135deg, {{ icon_bg|default:"#f59e0b, #d97706" }});
    display: flex; align-items: center; justify-content: center;
    font-size: 2.6rem; box-shadow: 0 14px 36px rgba(217,119,6,.32);
}
.closed-wrap h1 {
    font-size: 1.5rem; font-weight: 900; color: #92400e; margin-bottom: 12px;
}
.closed-wrap p {
    font-size: 1rem; color: #64748b; line-height: 1.8; margin-bottom: 28px;
}
.closed-hours {
    display: inline-flex; align-items: center; gap: 10px;
    background: #fffbeb; border: 1.5px solid #fde68a; border-radius: 16px;
    padding: 14px 24px; font-weight: 800; color: #92400e; margin-bottom: 28px;
}
.closed-btn {
    display: inline-flex; align-items: center; gap: 10px;
    background: linear-gradient(135deg, #2563eb, #10b981);
    color: #fff; text-decoration: none; font-weight: 800;
    padding: 14px 32px; border-radius: 16px;
    box-shadow: 0 10px 28px rgba(124,58,237,.32);
}
</style>

<div class="closed-wrap">
    <div class="closed-icon">{{ closed_icon|default:"🌙" }}</div>
    <h1>{{ closed_title|default:"ຮ້ານປິດແລ້ວ" }}</h1>
    <p>{{ closed_error }}</p>
    {% if show_hours %}
    <div class="closed-hours"><i class="fas fa-clock"></i> ເປີດທຸກວັນ 09:00 — 18:00</div>
    {% endif %}
    <div>
        <a href="/cart" class="closed-btn"><i class="fas fa-cart-shopping"></i> ກັບໄປກະຕ່າ</a>
    </div>
</div>

{% endblock content %}
